company:
  name: Dunder Mifflin
  country: US
  timezone: America
hardware:
  types:
  - windows
  - macbook
  tiers:
    standard:
      label: Standard
      description: Basic workload — office, email, productivity
    standard_plus:
      label: Standard Plus
      description: Medium workload — multiple apps, light development
    power:
      label: Power
      description: Heavy workload — development, design, data
  po_reasons:
    new_joiner: NEW JOINER
    equipment_change: CAMBIO DE EQUIPO
    replacement: REPOSICION DE EQUIPO
  specs:
    macbook:
      standard:
        chip_min: "M4"
        ram_min_gb: 16
        storage_min_gb: 512
        screen_inch: 13
      standard_plus:
        chip_min: "M4"
        ram_min_gb: 16
        storage_min_gb: 512
        screen_inch: 14
      power:
        chip_min: "M4"
        ram_min_gb: 16
        storage_min_gb: 512
        screen_inch: 16

    windows:
      standard:
        processor_gen_min: 13
        ram_min_gb: 16
        storage_min_gb: 512
        screen_inch: 14
      standard_plus:
        processor_gen_min: 13
        ram_min_gb: 16
        storage_min_gb: 512
        screen_inch: 14
      power:
        processor_gen_min: 13
        ram_min_gb: 16
        storage_min_gb: 512
        screen_inch: 15.6
ticket:
  project_key: IT-Procurement
  statuses:
    new: New
    on_hold: On Hold
    waiting_approval: Waiting for Approval
    waiting_delivery: Waiting for Delivery
    waiting_pickup: Waiting for Pickup
    waiting_support: Waiting for Support
    under_investigation: Under Investigation
    closed: Closed
  approval:
    sla_hours: 48
    reminder_after_hours: 24
integrations:
  jira:
    url: ${JIRA_URL}
    user: ${JIRA_USER}
    api_token: ${JIRA_API_TOKEN}
    api_version: 3
  netsuite:
    account_id: ${NETSUITE_ACCOUNT_ID}
    consumer_key: ${NETSUITE_CONSUMER_KEY}
    consumer_secret: ${NETSUITE_CONSUMER_SECRET}
    token_id: ${NETSUITE_TOKEN_ID}
    token_secret: ${NETSUITE_TOKEN_SECRET}
  abasteo:
    url: ${ABASTEO_URL}
    user: ${ABASTEO_USER}
    password: ${ABASTEO_PASSWORD}
notifications:
  channels:
    email: ${NOTIFY_EMAIL}
    slack: ${NOTIFY_SLACK}
    teams: ${NOTIFY_TEAMS}
  email:
    sender: ${NOTIFY_EMAIL_SENDER}
  slack:
    webhook_url: ${SLACK_WEBHOOK_URL}
    channel: '#it-purchases'
  teams:
    webhook_url: ${TEAMS_WEBHOOK_URL}
finance:
  team_email: ${FINANCE_TEAM_EMAIL}
  payment_lead_time_hours: 24
  price_change_tolerance_pct: 0
  tax_rate: 0.16
